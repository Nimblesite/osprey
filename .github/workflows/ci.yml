# agent-pmo:74cf183
name: CI

# CI runs ONLY on PRs to main. Merging to main triggers nothing; releases are
# tag-triggered (release.yml). See docs/RELEASING.md.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change detection ───────────────────────────────────────────────────────
  # Website-only PRs (changes confined to website/**) don't need the compiler, C
  # runtime, VS Code extension or web-compiler toolchain. Detect whether anything
  # OUTSIDE website/ changed so the heavy jobs below can skip.
  #
  # Required-check note: the `ci` job ("Test, Format, Build & Validate") is the
  # required status check on `main` (ruleset 6154907). Skipping a job via an `if:`
  # condition reports its check as "skipped", which branch protection treats as
  # PASSING — so a website-only PR still merges. Do NOT convert this to an
  # `on: paths:` filter: a workflow skipped by path filtering leaves the required
  # check pending forever and blocks the merge.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            website:
              - 'website/**'
            code:
              - '!website/**'

  ci:
    # IMPORTANT: this name is the required status check on `main` (ruleset 6154907).
    # Renaming it will break branch protection — coordinate with the ruleset update.
    name: Test, Format, Build & Validate
    needs: changes
    # Skip the full compiler/runtime/extension pipeline for website-only PRs.
    # A skipped required check reports as passing (see the `changes` job note).
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    # TIMEOUT EXCEPTION: full compiler build + C runtime compile + extension
    # tests + Docker web compiler test requires ~15 min
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            vscode-extension/package-lock.json
            webcompiler/package-lock.json
            website/package-lock.json
            examples/projects/modules/e2e/package-lock.json

      # Rust toolchain + clang/LLVM + C runtime archives + the osprey binary.
      - name: Setup Osprey Compiler
        uses: ./.github/actions/setup-osprey-compiler

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: ./vscode-extension

      - name: Install jq, Xvfb and coverage tooling
        # jq reads coverage-thresholds.json; Xvfb backs the VS Code extension
        # tests; cargo-llvm-cov produces the Rust lcov report `make test` checks.
        run: |
          sudo apt-get install -y jq xvfb
          cargo install cargo-llvm-cov --locked || true

      # [CI-DESLOP] The duplication gate. `make lint` runs the `deslop` target,
      # which enforces the ceiling in .deslop.toml (deslop exits 3 when over).
      # Installed from the Nimblesite Homebrew tap so the gate is ENFORCED here;
      # the Makefile only skips it when the binary is entirely absent.
      - name: Install deslop (duplication gate)
        uses: Homebrew/actions/setup-homebrew@master
      - name: Install deslop
        run: brew install nimblesite/tap/deslop

      # [SWR-VERSION-MANIFEST] keep shipwright.json valid against the in-repo
      # Shipwright schema. Do not use @nimblesite/shipwright-validate-manifest:
      # published versions currently ship without their bundled schemas.
      - name: Validate deployment manifest
        run: npm run test:shipwright
        working-directory: ./vscode-extension

      - name: Lint
        run: make lint

      # make test = fail-fast + per-project coverage + threshold enforcement +
      # the differential golden suite. Thresholds live in coverage-thresholds.json
      # ([COVERAGE-THRESHOLDS-JSON]). Xvfb is needed because vscode-extension
      # tests spawn a real VS Code Electron build.
      - name: Test
        run: xvfb-run -a make test

      # Talon Bank modules showcase (examples/projects/modules): real Chromium
      # drives the compiled osprey binary serving its HTTP API and web UI.
      - name: Install bank e2e dependencies
        run: npm ci
        working-directory: ./examples/projects/modules/e2e
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: ./examples/projects/modules/e2e
      - name: Bank e2e (Playwright)
        run: npx playwright test
        working-directory: ./examples/projects/modules/e2e
      - name: Upload bank e2e results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bank-e2e-results
          path: examples/projects/modules/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs
          path: |
            test.log
            vscode-extension/test.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            lcov.info
            vscode-extension/coverage/
          retention-days: 7

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/release/osprey
            compiler/lib/
            vscode-extension/out/
          retention-days: 7

      - name: Test example compilation and execution
        run: |
          target/release/osprey examples/tested/basics/math/comprehensive_math.osp --run
          target/release/osprey examples/tested/basics/feature_omnibus.osp --run

      - name: Test Web Compiler
        run: |
          cd webcompiler
          docker build -t osprey-web-compiler-ci -f Dockerfile ..
          docker run -d --name osprey-web-compiler-ci -p 3001:3001 \
            -e NODE_ENV=production -e PORT=3001 \
            --memory=256m --memory-reservation=256m \
            osprey-web-compiler-ci
          sleep 15
          chmod +x test.sh && ./test.sh
          docker stop osprey-web-compiler-ci
          docker rm osprey-web-compiler-ci

  # ─── Focused compiler gate ──────────────────────────────────────────────────
  # Fast signal on the compiler alone: format + clippy (-D warnings: clippy::all
  # + pedantic + restriction) + workspace tests + the differential harness —
  # every examples/tested case run through `osprey --run` must match its
  # .expectedoutput byte-for-byte (whole-string trim), and the must-reject suite
  # (examples/failscompilation) must stay within the FC_EXPECTED_ESCAPES ratchet.
  rust:
    name: Rust Compiler (fmt, clippy, test, differential)
    needs: changes
    # Compiler-only gate — irrelevant to website-only PRs, so skip them.
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-

      - name: Install clang/LLVM, OpenSSL, SQLite and zsh
        # clang links the osprey-emitted IR; libssl-dev/libsqlite3-dev satisfy
        # the HTTP and FFI-database runtimes the examples link; zsh runs the
        # differential harness.
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libssl-dev libsqlite3-dev pkg-config zsh
          clang --version

      - name: Build the C runtime archives (pure C — osprey links these)
        run: make _runtime

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all targets, warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Test (workspace)
        run: cargo test --workspace

      - name: Differential golden tests (osprey --run vs .expectedoutput)
        # Must be 41/41 with zero examples lacking an expected output, and the
        # must-reject ratchet must hold.
        run: |
          out=$(zsh crates/diff_examples.sh)
          echo "$out"
          echo "$out" | grep -Eq 'FAIL=0 '  || { echo '::error::differential test FAILures'; exit 1; }
          echo "$out" | grep -Eq 'NOEXP=0 ' || { echo '::error::an example has no .expectedoutput'; exit 1; }
          echo "$out" | grep -q  'FC_OK'    || { echo '::error::must-reject ratchet exceeded (ill-formed programs accepted)'; exit 1; }

  # ─── WebAssembly target ─────────────────────────────────────────────────────
  # Compiles a sample Osprey program to wasm32-wasip1 with `osprey --target=wasm32`
  # and gates on the artifact being well-formed (`wasm-validate`) and producing
  # the expected stdout under a WASI host (Node's built-in `node:wasi`). Proves
  # the wasm runtime archive links and the emitted module actually runs.
  # Self-contained (no VS Code toolchain) so it stays fast. [WASM-TARGET]
  wasm:
    name: WebAssembly target (wasm32-wasip1)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang/LLVM, lld (wasm-ld), wabt and a WASI sysroot
        # clang's wasm32 backend lowers the IR; lld provides wasm-ld; wabt gives
        # wasm-validate; the wasi-sdk sysroot supplies wasm32-wasip1 libc + crt1.
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld wabt zsh
          WASI_VERSION=24
          curl -fsSL -o /tmp/wasi-sysroot.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sysroot-${WASI_VERSION}.0.tar.gz"
          # The release tarball unpacks to a versioned top dir (wasi-sysroot-<v>.0/);
          # strip it so the sysroot lands at a stable path containing lib/wasm32-wasip1.
          sudo mkdir -p /opt/wasi-sdk/share/wasi-sysroot
          sudo tar -xzf /tmp/wasi-sysroot.tar.gz -C /opt/wasi-sdk/share/wasi-sysroot --strip-components=1
          test -d /opt/wasi-sdk/share/wasi-sysroot/lib/wasm32-wasip1
          echo "OSPREY_WASI_SYSROOT=/opt/wasi-sdk/share/wasi-sysroot" >> "$GITHUB_ENV"
          wasm-ld --version

      - name: Build native + wasm runtime archives and the compiler
        run: |
          make _runtime
          make _runtime_wasm
          cargo build --release -p osprey-cli

      - name: Compile the example to wasm, validate, and smoke-run under WASI
        run: |
          mkdir -p examples/wasm/build
          target/release/osprey examples/wasm/hello.osp --target=wasm32 \
            --compile -o examples/wasm/build/hello.wasm
          wasm-validate examples/wasm/build/hello.wasm
          node scripts/wasm-smoke.mjs examples/wasm/build/hello.wasm examples/wasm/hello.expectedoutput
          node scripts/wasm-browser-smoke.mjs examples/wasm/build/hello.wasm examples/wasm/hello.expectedoutput

      - name: WebAssembly golden suite (every tested example, wasm vs .expectedoutput)
        # Compiles every examples/tested/*.osp to wasm and runs it under
        # Node's WASI, comparing stdout to its .expectedoutput. Examples using a
        # non-portable feature (fibers/HTTP/SQLite/processes/file I/O/random) link
        # with an `undefined symbol` and are SKIPped, not failed. Gate: FAIL=0.
        run: |
          out=$(zsh crates/diff_wasm_examples.sh)
          echo "$out"
          echo "$out" | grep -Eq 'FAIL=0 '  || { echo '::error::wasm golden suite FAILures'; exit 1; }
          echo "$out" | grep -Eq 'NOEXP=0 ' || { echo '::error::a tested example has no .expectedoutput'; exit 1; }

  # ─── Website end-to-end (Playwright) ────────────────────────────────────────
  # Builds the site (compiler-free; committed reference docs) and runs the
  # Playwright suite: every page template at three breakpoints (no JS errors,
  # no horizontal overflow, dark theme, chrome present, logo resolves) plus
  # nav / hero / mobile-menu / TOC interaction assertions.
  website:
    name: Website E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-website-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-website-wasm-

      - name: Install wasm toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld wabt zsh
          WASI_VERSION=24
          curl -fsSL -o /tmp/wasi-sysroot.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sysroot-${WASI_VERSION}.0.tar.gz"
          sudo mkdir -p /opt/wasi-sdk/share/wasi-sysroot
          sudo tar -xzf /tmp/wasi-sysroot.tar.gz -C /opt/wasi-sdk/share/wasi-sysroot --strip-components=1
          test -d /opt/wasi-sdk/share/wasi-sysroot/lib/wasm32-wasip1
          echo "OSPREY_WASI_SYSROOT=/opt/wasi-sdk/share/wasi-sysroot" >> "$GITHUB_ENV"
          wasm-ld --version
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7
