# agent-pmo:74cf183
name: Deploy to GitHub Pages

on:
  # Reusable site deploy. It deliberately has NO `push` trigger — the live site
  # only updates as part of a release. release.yml calls this (workflow_call)
  # after the stable GitHub Release is created (a release made with the default
  # GITHUB_TOKEN does not emit a `release: published` event that can start
  # another workflow, so the release pipeline invokes this one directly).
  # `workflow_dispatch` allows a manual redeploy. Nothing here fires on a push
  # to main.
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build Documentation and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Full history: spec/docs page dates come from `git log` (Eleventy's
      # "git Last Modified"), so a shallow clone would stamp every page with
      # the single fetched commit's date instead of when it actually changed.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-pages-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pages-wasm-

      - name: Install wasm toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld wabt zsh
          WASI_VERSION=24
          curl -fsSL -o /tmp/wasi-sysroot.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sysroot-${WASI_VERSION}.0.tar.gz"
          sudo mkdir -p /opt/wasi-sdk/share/wasi-sysroot
          sudo tar -xzf /tmp/wasi-sysroot.tar.gz -C /opt/wasi-sdk/share/wasi-sysroot --strip-components=1
          test -d /opt/wasi-sdk/share/wasi-sysroot/lib/wasm32-wasip1
          echo "OSPREY_WASI_SYSROOT=/opt/wasi-sdk/share/wasi-sysroot" >> "$GITHUB_ENV"
          wasm-ld --version

      - name: Install website dependencies
        working-directory: ./website
        run: npm ci

      - name: Build website WebAssembly demo
        run: make wasm-site

      - name: Build website (uses committed reference docs)
        working-directory: ./website
        run: npm run build

      # Gate the live deploy on the Playwright e2e suite — a broken or visually
      # regressed site never reaches production.
      - name: Install Playwright browser
        working-directory: ./website
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        working-directory: ./website
        run: npx playwright test

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
